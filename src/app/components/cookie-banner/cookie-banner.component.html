@if (showBanner()) {
  <div class="fixed bottom-0 left-0 right-0 z-50 p-4 bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 shadow-2xl transition-all duration-300">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
      <div class="flex-1">
        <h3 class="text-lg font-bold text-gray-900 dark:text-white mb-1">Aviso de Cookies 🍪</h3>
        <p class="text-sm text-gray-600 dark:text-gray-300">
          Utilizamos cookies propias y de terceros para mejorar tu experiencia y mostrarte publicidad personalizada. 
          Al continuar navegando, consideramos que aceptas su uso.
        </p>
      </div>
      <div class="flex gap-4">
        <button (click)="acceptCookies()" class="px-6 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-semibold transition-colors">
          Aceptar
        </button>
      </div>
    </div>
  </div>
}
