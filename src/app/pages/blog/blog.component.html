<div class="max-w-3xl mx-auto px-6 py-12">
  <nav class="flex mb-8 text-sm text-gray-500" aria-label="Breadcrumb">
    <ol class="flex items-center space-x-2">
      <li><a routerLink="/" class="hover:text-indigo-600 transition-colors">Inicio</a></li>
      <li>
        <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
      </li>
      <li><a routerLink="/blog" class="hover:text-indigo-600 transition-colors">Blog</a></li>
      @if (metadata()) {
        <li>
          <svg class="w-4 h-4 text-gray-400" fill="currentColor" viewBox="0 0 20 20"><path d="M7.293 14.707a1 1 0 010-1.414L10.586 10 7.293 6.707a1 1 0 011.414-1.414l4 4a1 1 0 010 1.414l-4 4a1 1 0 01-1.414 0z"/></svg>
        </li>
        <li class="font-medium text-gray-900 truncate max-w-[150px] md:max-w-none">{{ metadata()?.title }}</li>
      }
    </ol>
  </nav>

  @if (metadata()) {
    <h1 class="text-4xl font-bold text-gray-900 mb-2">{{ metadata()?.title }}</h1>
    <p class="text-gray-500 mb-8">{{ metadata()?.date | date:'longDate' }}</p>
  }

  @if (content()) {
    <article class="prose prose-indigo lg:prose-xl max-w-none" [innerHTML]="content()"></article>
  } @else if (error()) {
    <app-error [statusCode]="errorCode()"></app-error>
  } @else if (isLoading()) {
    <div class="text-center py-20 text-gray-500">
      <p>Cargando artículo...</p>
    </div>
  }
</div>
