<div class="min-h-[80dvh] flex items-center justify-center px-6 py-24 sm:py-32 lg:px-8">
  <div class="text-center">
    <p class="text-6xl font-black text-indigo-600 animate-bounce">{{ statusCode() }}</p>
    <h1 class="mt-4 text-3xl font-bold tracking-tight text-gray-900 sm:text-5xl">Página no encontrada</h1>
    <p class="mt-6 text-base leading-7 text-gray-600 max-w-md mx-auto">
      Lo sentimos, no hemos podido encontrar la página que buscas. Puede que el enlace esté roto o que el artículo del blog haya sido movido.
    </p>
    <div class="mt-10 flex items-center justify-center gap-x-6">
      <a routerLink="/" 
         class="rounded-full bg-indigo-600 px-8 py-3 text-sm font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 transition-all hover:scale-105 active:scale-95">
        Ir al inicio
      </a>
      <button (click)="goBack()" 
              class="text-sm font-semibold text-gray-900 hover:text-indigo-600 flex items-center gap-2 group transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4 group-hover:-translate-x-1 transition-transform">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
        </svg>
        Volver atrás
      </button>
    </div>
  </div>
</div>
